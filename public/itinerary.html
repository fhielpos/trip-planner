<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itinerary — Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#181614" />
</head>
<body>

  <header class="app-header no-print">
    <div class="header-inner">
      <div class="header-title">
        <a href="/index.html" class="accom-back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span data-i18n="accom.back">Back</span>
        </a>
        <h1 data-i18n="itinerary.title">Itinerary</h1>
      </div>
      <div class="header-right">
        <button class="btn-secondary" id="btn-print" data-i18n="itinerary.print">Print</button>
        <span class="offline-indicator" id="offline-indicator" data-i18n="offline.indicator" hidden></span>
        <button class="lang-toggle" id="lang-toggle" title="Switch language" aria-label="Switch language">EN</button>
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-main itinerary-main">
    <p class="itinerary-hint no-print" data-i18n="itinerary.hint">One boarding pass per flight and train — print or save as PDF before you go.</p>
    <div id="itinerary-list"></div>
  </main>

  <footer class="app-footer no-print">
    <span id="app-version" class="app-version"></span>
  </footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/offline.js"></script>
  <script src="/js/itinerary.js"></script>
  <script>
    fetch('/api/version').then(r => r.json()).then(({ commit }) => {
      document.getElementById('app-version').textContent = commit.slice(0, 8);
    });
  </script>
</body>
</html>
