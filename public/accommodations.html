<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accommodations — Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#181614" />
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <a href="/index.html" class="accom-back-link" data-i18n="accom.back">&larr; Back</a>
        <h1 data-i18n="accom.title">Accommodations</h1>
      </div>
      <div class="header-right">
        <span class="offline-indicator" id="offline-indicator" data-i18n="offline.indicator" hidden></span>
        <button class="lang-toggle" id="lang-toggle" title="Switch language" aria-label="Switch language">EN</button>
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-main accom-main">

    <div id="accom-stats-grid" class="accom-manifest-strip"></div>

    <div class="accom-list" id="accom-table-body"></div>

  </main>

  <!-- Edit modal: address + total price only -->
  <div class="modal-overlay" id="accom-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 data-i18n="accom.edit.title">Edit stay details</h3>
        <button class="modal-close" id="accom-modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form class="modal-form" id="accom-form">
        <input type="hidden" id="accom-id" />
        <div class="form-row">
          <label for="accom-address" data-i18n="accom.edit.address">Address</label>
          <input type="text" id="accom-address" data-i18n-placeholder="accom.edit.addressPlaceholder" placeholder="Optional" />
        </div>
        <div class="form-row">
          <label for="accom-total-price" data-i18n="accom.edit.totalPrice">Total price</label>
          <input type="number" id="accom-total-price" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-actions">
          <div class="form-actions-right">
            <button type="button" class="btn-secondary" id="accom-cancel-btn" data-i18n="modal.cancel">Cancel</button>
            <button type="submit" class="btn-primary" data-i18n="modal.save">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <footer class="app-footer">
    <span id="app-version" class="app-version"></span>
  </footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/offline.js"></script>
  <script src="/js/accommodations.js"></script>
  <script>
    fetch('/api/version').then(r => r.json()).then(({ commit }) => {
      document.getElementById('app-version').textContent = commit.slice(0, 8);
    });
  </script>
</body>
</html>
